<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style2.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    
    <div class="main">
        <div class="status">
            <h2>No Status</h2>
            <button class="add_btn"> +add todo </button>
            <div class="todo">
                <span>Buy a pizza</span>
                <span class="close"> &times; </span>
            </div>
        </div>
        <div class="status">
            <h2>Not Started</h2>
        </div>
        <div class="status">
            <h2>In Process</h2>
        </div>
        <div class="status">
            <h2>Completed</h2>
        </div>
    </div>

    <form action="" class="modal">
        <div class="header">
            <span> ADD TASK </span>
            <span class="close"> &times; </span>
        </div>
        <div class="body">
            <input type="text">
            <input type="submit" value="add task">
        </div>
    </form>


    <script src="script2.js"></script>
</body>

</html>
